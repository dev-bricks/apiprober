<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="100%" height="auto">
  <defs>
    <!-- Google Fonts import -->
    <style>
      <![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Fira+Code:wght@400;700&display=swap');
      
      .title-text {
        font-family: 'Outfit', 'Segoe UI', sans-serif;
        font-weight: 900;
        font-size: 68px;
        letter-spacing: -1px;
      }
      .tagline-text {
        font-family: 'Outfit', 'Segoe UI', sans-serif;
        font-weight: 700;
        font-size: 13.5px;
        letter-spacing: 4px;
        fill: #94a3b8;
      }
      .mono-text {
        font-family: 'Fira Code', 'Courier New', monospace;
        font-size: 13px;
        fill: #67e8f9;
        opacity: 0.85;
      }
      .cursor {
        animation: blink 1s infinite;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      ]]>
    </style>

    <!-- Glowing Filters -->
    <filter id="glowCyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowBlue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowOrange" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Text Glow Filters -->
    <filter id="glowCyanText" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComponentTransfer in="blur" result="boost">
        <feFuncA type="linear" slope="0.8"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="boost" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glowBlueText" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComponentTransfer in="blur" result="boost">
        <feFuncA type="linear" slope="0.8"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="boost" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Radial Background Gradient -->
    <radialGradient id="bgGlow" cx="320" cy="170" r="700" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f1f38" />
      <stop offset="40%" stop-color="#060b14" />
      <stop offset="100%" stop-color="#030508" />
    </radialGradient>

    <!-- Dot Grid Pattern -->
    <pattern id="dotGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#3b82f6" opacity="0.12" />
    </pattern>

    <!-- Radar Sweep Gradient -->
    <linearGradient id="sweepGrad" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.0" />
    </linearGradient>
  </defs>

  <!-- BACKGROUND LAYER -->
  <rect width="1200" height="340" fill="url(#bgGlow)" />
  <rect width="1200" height="340" fill="url(#dotGrid)" />

  <!-- FAINT BACKGROUND CODE PANELS -->
  <!-- Code Panel 1 (Top-Left) -->
  <g opacity="0.12" transform="translate(60, 45)">
    <rect width="160" height="75" rx="4" fill="#0b0f19" stroke="#3b82f6" stroke-width="0.8" />
    <line x1="10" y1="12" x2="40" y2="12" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round" />
    <line x1="10" y1="22" x2="110" y2="22" stroke="#3b82f6" stroke-width="1.8" stroke-linecap="round" />
    <line x1="20" y1="32" x2="80" y2="32" stroke="#64748b" stroke-width="1.8" stroke-linecap="round" />
    <line x1="20" y1="42" x2="130" y2="42" stroke="#3b82f6" stroke-width="1.8" stroke-linecap="round" />
    <line x1="10" y1="52" x2="50" y2="52" stroke="#fb923c" stroke-width="1.8" stroke-linecap="round" />
    <line x1="10" y1="62" x2="95" y2="62" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round" />
  </g>
  
  <!-- Code Panel 2 (Bottom-Right) -->
  <g opacity="0.1" transform="translate(980, 220)">
    <rect width="160" height="75" rx="4" fill="#0b0f19" stroke="#3b82f6" stroke-width="0.8" />
    <line x1="10" y1="12" x2="120" y2="12" stroke="#3b82f6" stroke-width="1.8" stroke-linecap="round" />
    <line x1="20" y1="22" x2="60" y2="22" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round" />
    <line x1="20" y1="32" x2="100" y2="32" stroke="#64748b" stroke-width="1.8" stroke-linecap="round" />
    <line x1="10" y1="42" x2="80" y2="42" stroke="#fb923c" stroke-width="1.8" stroke-linecap="round" />
    <line x1="15" y1="52" x2="140" y2="52" stroke="#3b82f6" stroke-width="1.8" stroke-linecap="round" />
    <line x1="10" y1="62" x2="70" y2="62" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round" />
  </g>

  <!-- CORNER HUD TICKS -->
  <path d="M 30 20 H 20 V 30" stroke="#3b82f6" stroke-width="1.2" fill="none" opacity="0.25" />
  <path d="M 1170 20 H 1180 V 30" stroke="#3b82f6" stroke-width="1.2" fill="none" opacity="0.25" />
  <path d="M 30 320 H 20 V 310" stroke="#3b82f6" stroke-width="1.2" fill="none" opacity="0.25" />
  <path d="M 1170 320 H 1180 V 310" stroke="#3b82f6" stroke-width="1.2" fill="none" opacity="0.25" />

  <!-- RADAR SCOPE HERO ELEMENT -->
  <g id="radar-scope">
    <!-- Outer rim / HUD accents -->
    <circle cx="320" cy="170" r="130" stroke="#3b82f6" stroke-width="0.5" fill="none" opacity="0.15" />
    
    <!-- Radar concentric rings -->
    <circle cx="320" cy="170" r="120" stroke="#22d3ee" stroke-width="1" fill="none" opacity="0.1" />
    <circle cx="320" cy="170" r="120" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="4 8" fill="none" opacity="0.25" />
    <circle cx="320" cy="170" r="90" stroke="#22d3ee" stroke-width="1" fill="none" opacity="0.15" />
    <circle cx="320" cy="170" r="60" stroke="#22d3ee" stroke-width="1" stroke-dasharray="3 6" fill="none" opacity="0.2" />
    <circle cx="320" cy="170" r="30" stroke="#22d3ee" stroke-width="1" fill="none" opacity="0.15" />
    
    <!-- Crosshairs -->
    <line x1="320" y1="40" x2="320" y2="300" stroke="#22d3ee" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.2" />
    <line x1="190" y1="170" x2="450" y2="170" stroke="#22d3ee" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.2" />
    
    <!-- Sonar pulses (Staggered expanding rings) -->
    <circle cx="320" cy="170" r="0" stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0">
      <animate attributeName="r" values="0;120" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8;0" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="320" cy="170" r="0" stroke="#3b82f6" stroke-width="1.5" fill="none" opacity="0">
      <animate attributeName="r" values="0;120" dur="4s" begin="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8;0" dur="4s" begin="2s" repeatCount="indefinite" />
    </circle>

    <!-- Sweep Beam -->
    <g>
      <!-- Glowing leading edge line -->
      <line x1="320" y1="170" x2="320" y2="50" stroke="#00d4ff" stroke-width="2.5" filter="url(#glowCyan)" />
      <!-- Trailing fading wedge -->
      <path d="M 320 170 L 320 50 A 120 120 0 0 0 200 170 Z" fill="url(#sweepGrad)" opacity="0.45" />
      
      <animateTransform attributeName="transform" type="rotate" from="0 320 170" to="360 320 170" dur="5s" repeatCount="indefinite" />
    </g>

    <!-- Radar center dot -->
    <circle cx="320" cy="170" r="4" fill="#22d3ee" filter="url(#glowCyan)" />
  </g>

  <!-- NETWORK GRAPH OVERLAY -->
  <g id="network-graph">
    <!-- Network Static Connections -->
    <line x1="230" y1="120" x2="210" y2="210" stroke="#38bdf8" stroke-width="1.2" opacity="0.25" />
    <line x1="210" y1="210" x2="280" y2="260" stroke="#38bdf8" stroke-width="1.2" opacity="0.25" />
    <line x1="280" y1="260" x2="390" y2="240" stroke="#38bdf8" stroke-width="1.2" opacity="0.25" />
    <line x1="390" y1="240" x2="420" y2="160" stroke="#38bdf8" stroke-width="1.2" opacity="0.25" />
    <line x1="420" y1="160" x2="440" y2="110" stroke="#38bdf8" stroke-width="1.2" opacity="0.25" />
    <line x1="380" y1="100" x2="440" y2="110" stroke="#38bdf8" stroke-width="1.2" opacity="0.25" />
    <line x1="380" y1="100" x2="310" y2="75" stroke="#38bdf8" stroke-width="1.2" opacity="0.25" />
    <line x1="230" y1="120" x2="310" y2="75" stroke="#38bdf8" stroke-width="1.2" opacity="0.25" />
    <line x1="420" y1="160" x2="380" y2="100" stroke="#38bdf8" stroke-width="1.2" opacity="0.25" />
    <line x1="230" y1="120" x2="280" y2="260" stroke="#38bdf8" stroke-width="1.2" opacity="0.25" />
    <line x1="390" y1="240" x2="380" y2="100" stroke="#38bdf8" stroke-width="1.2" opacity="0.25" />

    <!-- Animated Data Pulses moving along paths -->
    <path d="M 230 120 L 310 75" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="6 30" fill="none" opacity="0.55">
      <animate attributeName="stroke-dashoffset" from="36" to="0" dur="2s" repeatCount="indefinite" />
    </path>
    <path d="M 210 210 L 280 260" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="8 40" fill="none" opacity="0.5">
      <animate attributeName="stroke-dashoffset" from="48" to="0" dur="2.5s" repeatCount="indefinite" />
    </path>
    <path d="M 390 240 L 420 160" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="6 30" fill="none" opacity="0.55">
      <animate attributeName="stroke-dashoffset" from="36" to="0" dur="1.8s" repeatCount="indefinite" />
    </path>
    <path d="M 380 100 L 310 75" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="10 40" fill="none" opacity="0.5">
      <animate attributeName="stroke-dashoffset" from="0" to="50" dur="2.2s" repeatCount="indefinite" />
    </path>

    <!-- Dotted lines to labels / chips -->
    <line x1="230" y1="120" x2="203" y2="120" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="2 2" opacity="0.5" />
    <line x1="420" y1="160" x2="460" y2="160" stroke="#22d3ee" stroke-width="1.2" stroke-dasharray="2 2" opacity="0.5" />
    <line x1="390" y1="240" x2="420" y2="240" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="2 2" opacity="0.5" />
    <line x1="310" y1="75" x2="330" y2="75" stroke="#22d3ee" stroke-width="1.2" stroke-dasharray="2 2" opacity="0.5" />
    <line x1="440" y1="110" x2="460" y2="110" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="2 2" opacity="0.5" />
    <line x1="210" y1="210" x2="201" y2="210" stroke="#ec4899" stroke-width="1.2" stroke-dasharray="2 2" opacity="0.5" />

    <!-- Badges & Method Chips -->
    <!-- Node A Group: /auth (POST) -->
    <g transform="translate(155, 111)">
      <rect width="48" height="18" rx="4" fill="#080f1d" stroke="#3b82f6" stroke-width="1" opacity="0.85" />
      <text x="24" y="13" fill="#93c5fd" font-family="'Fira Code', 'Courier New', monospace" font-size="10" font-weight="bold" text-anchor="middle">/auth</text>
    </g>
    <g transform="translate(115, 113)">
      <rect width="36" height="14" rx="3" fill="#fb923c" />
      <text x="18" y="10" fill="#080f1d" font-family="Segoe UI, sans-serif" font-size="9" font-weight="bold" text-anchor="middle">POST</text>
    </g>

    <!-- Node E Group: /users (GET) -->
    <g transform="translate(460, 151)">
      <rect width="52" height="18" rx="4" fill="#080f1d" stroke="#22d3ee" stroke-width="1" opacity="0.85" />
      <text x="26" y="13" fill="#a5f3fc" font-family="'Fira Code', 'Courier New', monospace" font-size="10" font-weight="bold" text-anchor="middle">/users</text>
    </g>
    <g transform="translate(516, 153)">
      <rect width="32" height="14" rx="3" fill="#22d3ee" />
      <text x="16" y="10" fill="#080f1d" font-family="Segoe UI, sans-serif" font-size="9" font-weight="bold" text-anchor="middle">GET</text>
    </g>

    <!-- Node D Group: /orders (POST) -->
    <g transform="translate(420, 231)">
      <rect width="58" height="18" rx="4" fill="#080f1d" stroke="#3b82f6" stroke-width="1" opacity="0.85" />
      <text x="29" y="13" fill="#93c5fd" font-family="'Fira Code', 'Courier New', monospace" font-size="10" font-weight="bold" text-anchor="middle">/orders</text>
    </g>
    <g transform="translate(482, 233)">
      <rect width="36" height="14" rx="3" fill="#fb923c" />
      <text x="18" y="10" fill="#080f1d" font-family="Segoe UI, sans-serif" font-size="9" font-weight="bold" text-anchor="middle">POST</text>
    </g>

    <!-- Node G Group: /api/v1 (GET) -->
    <g transform="translate(330, 66)">
      <rect width="58" height="18" rx="4" fill="#080f1d" stroke="#22d3ee" stroke-width="1" opacity="0.85" />
      <text x="29" y="13" fill="#a5f3fc" font-family="'Fira Code', 'Courier New', monospace" font-size="10" font-weight="bold" text-anchor="middle">/api/v1</text>
    </g>
    <g transform="translate(392, 68)">
      <rect width="32" height="14" rx="3" fill="#22d3ee" />
      <text x="16" y="10" fill="#080f1d" font-family="Segoe UI, sans-serif" font-size="9" font-weight="bold" text-anchor="middle">GET</text>
    </g>

    <!-- Node H Group: PUT chip -->
    <g transform="translate(460, 103)">
      <rect width="32" height="14" rx="3" fill="#3b82f6" />
      <text x="16" y="10" fill="#080f1d" font-family="Segoe UI, sans-serif" font-size="9" font-weight="bold" text-anchor="middle">PUT</text>
    </g>

    <!-- Node B Group: DEL chip -->
    <g transform="translate(165, 203)">
      <rect width="32" height="14" rx="3" fill="#ec4899" />
      <text x="16" y="10" fill="#080f1d" font-family="Segoe UI, sans-serif" font-size="9" font-weight="bold" text-anchor="middle">DEL</text>
    </g>

    <!-- Network Nodes -->
    <!-- Node A: Cyan Glow -->
    <circle cx="230" cy="120" r="5" fill="#22d3ee" filter="url(#glowCyan)" />
    <circle cx="230" cy="120" r="5" fill="none" stroke="#22d3ee" stroke-width="1">
      <animate attributeName="r" values="5;13;5" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1;0;1" dur="3s" repeatCount="indefinite" />
    </circle>

    <!-- Node B: Blue -->
    <circle cx="210" cy="210" r="5" fill="#3b82f6" />

    <!-- Node C: Cyan -->
    <circle cx="280" cy="260" r="4" fill="#22d3ee" />

    <!-- Node D: Orange Glow -->
    <circle cx="390" cy="240" r="5" fill="#fb923c" filter="url(#glowOrange)" />
    <circle cx="390" cy="240" r="5" fill="none" stroke="#fb923c" stroke-width="1">
      <animate attributeName="r" values="5;13;5" dur="2.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1;0;1" dur="2.5s" repeatCount="indefinite" />
    </circle>

    <!-- Node E: Cyan -->
    <circle cx="420" cy="160" r="4.5" fill="#22d3ee" />

    <!-- Node F: Blue Glow -->
    <circle cx="380" cy="100" r="5" fill="#3b82f6" filter="url(#glowBlue)" />
    <circle cx="380" cy="100" r="5" fill="none" stroke="#3b82f6" stroke-width="1">
      <animate attributeName="r" values="5;11;5" dur="3.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1;0;1" dur="3.5s" repeatCount="indefinite" />
    </circle>

    <!-- Node G: Orange -->
    <circle cx="310" cy="75" r="4" fill="#fb923c" />

    <!-- Node H: Blue -->
    <circle cx="440" cy="110" r="4.5" fill="#3b82f6" />
  </g>

  <!-- WORDMARK AND TEXT COMPONENT -->
  <g transform="translate(640, 140)">
    <!-- Main Title "APIPROBER" -->
    <text class="title-text" y="0">
      <tspan fill="#22d3ee" filter="url(#glowCyanText)">API</tspan><tspan fill="#3b82f6" filter="url(#glowBlueText)">PROBER</tspan>
    </text>
    
    <!-- Tagline below -->
    <text x="3" y="42" class="tagline-text">PASSIVE API DISCOVERY &amp; MAPPING TOOL</text>
    
    <!-- Command Mono Prompt line -->
    <g transform="translate(3, 76)">
      <!-- Console text -->
      <text class="mono-text">
        <tspan fill="#38bdf8" opacity="0.6">$ </tspan>apiprober probe <tspan fill="#38bdf8">&lt;url&gt;</tspan><tspan fill="#22d3ee" class="cursor">_</tspan>
      </text>
    </g>
  </g>

  <!-- BOTTOM STATUS LABELS -->
  <g transform="translate(40, 305)" opacity="0.45">
    <text font-family="'Fira Code', 'Courier New', monospace" font-size="8.5" fill="#64748b">
      <tspan fill="#22d3ee">SYS_STATUS:</tspan> SCANNING... | <tspan fill="#3b82f6">MODE:</tspan> PASSIVE | <tspan fill="#fb923c">RATE_LIMIT:</tspan> 500MS
    </text>
  </g>
  <g transform="translate(1160, 305)" opacity="0.45" text-anchor="end">
    <text font-family="'Fira Code', 'Courier New', monospace" font-size="8.5" fill="#64748b">
      ApiProber v2.0 // DEPS: ZERO // DATABASE: SQLITE3
    </text>
  </g>
</svg>